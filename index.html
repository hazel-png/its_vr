<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  </head>
  <body>
<a-scene>
  <a-entity 
    sound="src: url(https://cdn.aframe.io/basic-guide/audio/backgroundnoise.wav); 
           autoplay: true; 
           loop: true; 
           positional: true; 
           refDistance: 1; 
           rolloffFactor: 5" 
    position="0 1.25 -5">
  </a-entity>

  <a-entity camera look-controls position="0 1.6 0">
    <a-cursor></a-cursor>
  </a-entity>
</a-scene>
  </body>
</html>
