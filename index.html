<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android VR - ボタン確実動作</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #000;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        #big-button {
            background: #ff4444;
            color: white;
            border: 4px solid #ff6666;
            padding: 30px 60px;
            font-size: 28px;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            margin: 20px 0;
            min-width: 300px;
            min-height: 100px;
            box-shadow: 0 10px 30px rgba(255,68,68,0.5);
            transition: all 0.2s;
        }
        #big-button:hover, #big-button:active {
            background: #ff2222;
            transform: scale(1.02);
            box-shadow: 0 15px 40px rgba(255,68,68,0.7);
        }
        #status {
            font-size: 20px;
            margin: 20px 0;
            min-height: 30px;
        }
        #scene-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            display: none;
        }
        h1 {
            font-size: 36px;
            margin: 0 0 20px 0;
            background: linear-gradient(45deg, #ff4444, #44ff44);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body>
    <h1>🎮 VR開始</h1>
    <div id="status">ボタンを長押ししてください</div>
    <button id="big-button">🚀 VR GO!</button>
    <p style="font-size: 16px; opacity: 0.8;">
        画面回転を自動に設定<br>
        スマホをゆっくり動かす
    </p>

    <div id="scene-container">
        <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
        <a-scene 
            embedded
            vr-mode-ui="enabled: false"
            background="color: #000011">
            
            <a-camera 
                position="0 1.6 0"
                look-controls="enabled: true"
                fov="80">
            </a-camera>

            <a-light type="ambient" color="#404040" intensity="0.5"></a-light>
            <a-light type="directional" color="#ffffff" intensity="0.8" position="1 2 1"></a-light>

            <!-- カラフル回転オブジェクト -->
            <a-box position="-1.5 1.5 -3" color="#ff4444" 
                   animation="property: rotation; to: 360 360 0; loop: true; dur: 10000"></a-box>
            <a-sphere position="1.5 1.8 -3" radius="0.6" color="#44ff44" 
                      animation="property: rotation; to: 0 360 360; loop: true; dur: 12000"></a-sphere>
            <a-cylinder position="0 0.5 -4" radius="0.5" height="2" color="#4444ff" 
                        animation="property: rotation; to: 360 0 0; loop: true; dur: 15000"></a-cylinder>

            <!-- トンネル -->
            <a-cylinder position="0 0 -12" radius="4" height="25" color="#ff44ff" 
                        material="transparent: true; opacity: 0.4"
                        rotation="90 0 0"
                        animation="property: rotation; to: 0 360 0; loop: true; dur: 20000"></a-cylinder>

            <a-sky color="#001122" animation="property: rotation; to: 0 -100 0; loop: true; dur: 50000"></a-sky>

        </a-scene>
    </div>

    <script>
        const button = document.getElementById('big-button');
        const status = document.getElementById('status');
        const container = document.getElementById('scene-container');
        const scene = document.querySelector('a-scene');

        // 超確実ボタン処理（複数イベント）
        function startVR() {
            status.textContent = '🎉 VR開始！頭を動かして！';
            button.style.display = 'none';
            
            // シーン表示（即時）
            container.style.display = 'block';
            
            // 即座にジャイロ有効化
            const camera = document.querySelector('a-camera');
            if (camera.components['look-controls']) {
                camera.components['look-controls'].enabled = true;
            }
            
            // 全画面化
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(() => {});
            }
        }

        // 複数イベントで確実動作
        button.addEventListener('click', startVR);
        button.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startVR();
        });
        button.addEventListener('touchend', (e) => e.preventDefault());
        
        // Enterキー/スペースキーでも開始
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                startVR();
            }
        });

        // シーン読み込み完了確認
        scene.addEventListener('loaded', () => {
            status.textContent = '準備完了！ボタンを押して';
        });

        // デバッグ用コンソール
        console.log('VR準備完了。ボタンをタップしてください');
    </script>
</body>
</html>
