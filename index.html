<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android VR - 超高感度</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #000;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        #big-button {
            background: #00ff88;
            color: #000;
            border: 4px solid #00cc66;
            padding: 30px 60px;
            font-size: 28px;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            margin: 20px 0;
            min-width: 300px;
            min-height: 100px;
            box-shadow: 0 10px 30px rgba(0,255,136,0.5);
            transition: all 0.2s;
        }
        #big-button:hover, #big-button:active {
            background: #00cc66;
            transform: scale(1.02);
            box-shadow: 0 15px 40px rgba(0,255,136,0.7);
        }
        #status {
            font-size: 20px;
            margin: 20px 0;
            min-height: 30px;
        }
        #scene-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            display: none;
        }
        h1 {
            font-size: 36px;
            margin: 0 0 20px 0;
            color: #00ff88;
            text-shadow: 0 0 20px #00ff88;
        }
        .speed-info {
            font-size: 18px;
            color: #00ff88;
            font-weight: bold;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>⚡ 超高感度VR</h1>
    <div class="speed-info">🚀 感度 3倍強化！</div>
    <div id="status">ボタンを押して開始</div>
    <button id="big-button">🎯 ハイスピードVR</button>
    <p style="font-size: 16px; opacity: 0.8;">
        わずかな頭の動きで激しく反応！<br>
        画面回転 → 自動
    </p>

    <div id="scene-container">
        <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
        <a-scene 
            embedded
            vr-mode-ui="enabled: false"
            background="color: #000000"
            antialias="true">
            
            <!-- 超高感度カメラ -->
            <a-camera 
                id="highsens-camera"
                position="0 1.6 0"
                look-controls="enabled: true"
                fov="90">
            </a-camera>

            <!-- 照明 -->
            <a-light type="ambient" color="#202040" intensity="0.6"></a-light>
            <a-light type="directional" color="#ffffff" intensity="1" position="1 2 1"></a-light>

            <!-- 高速回転オブジェクト -->
            <a-box position="-1.8 1.8 -3" 
                   color="#ff0040"
                   scale="0.8 0.8 0.8"
                   animation="property: rotation; to: 0 720 720; loop: true; dur: 5000; easing: linear">
            </a-box>
            
            <a-sphere position="1.8 2 -3.2" 
                      radius="0.7"
                      color="#00ff88"
                      animation="property: rotation; to: 720 0 720; loop: true; dur: 6000; easing: linear">
            </a-sphere>
            
            <a-cylinder position="0 0.8 -4" 
                        radius="0.6" 
                        height="1.5"
                        color="#4080ff"
                        animation="property: rotation; to: 720 720 0; loop: true; dur: 7000; easing: linear">
            </a-cylinder>

            <!-- 高速トンネル -->
            <a-cylinder position="0 0 -10" 
                        radius="3.5" 
                        height="40"
                        color="#ff40ff"
                        material="transparent: true; opacity: 0.5"
                        rotation="90 0 0"
                        animation="property: rotation; to: 0 1080 0; loop: true; dur: 12000; easing: linear">
            </a-cylinder>

            <!-- 爆速パーティクル -->
            <a-entity particle-system="particleCount: 200;
                                       velocityValue: 0 0.1 -0.2;
                                       velocitySpread: 0.8 0.5 0.8;
                                       color: #ff0040,#00ff88,#4080ff,#ff40ff;
                                       startSize: 0.03; endSize: 0.01;
                                       accelerationValue: 0 -0.02 0">
            </a-entity>

            <!-- 動く星空 -->
            <a-sky color="#000011" 
                   animation="property: rotation; to: 0 -360 0; loop: true; dur: 30000; easing: linear">
            </a-sky>

        </a-scene>
    </div>

    <script>
        const button = document.getElementById('big-button');
        const status = document.getElementById('status');
        const container = document.getElementById('scene-container');
        const scene = document.querySelector('a-scene');
        const camera = document.getElementById('highsens-camera');

        // 超高感度制御
        let sensitivityMultiplier = 2.5; // 2.5倍感度

        function startVR() {
            status.innerHTML = '⚡ <strong>超高感度VR開始！</strong>';
            button.style.display = 'none';
            
            // 即表示
            container.style.display = 'block';
            
            // 全画面
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
            
            // 超高感度ジャイロ有効化
            setTimeout(() => {
                const lookControls = camera.components['look-controls'];
                if (lookControls) {
                    lookControls.enabled = true;
                    
                    // 感度3倍化ハック
                    lookControls.pitchObject.rotationSpeed = 0.1 * sensitivityMultiplier;
                    lookControls.yawObject.rotationSpeed = 0.1 * sensitivityMultiplier;
                }
            }, 100);
        }

        // 確実ボタン動作
        button.onclick = startVR;
        button.ontouchstart = (e) => {
            e.preventDefault();
            startVR();
        };
        button.onmousedown = startVR;

        // キーボード対応
        document.onkeydown = (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                startVR();
            }
        };

        // ダブルタップ対策
        let tapCount = 0;
        button.ontouchend = () => {
            tapCount++;
            if (tapCount === 1) {
                setTimeout(() => {
                    tapCount = 0;
                }, 300);
            }
        };

        // シーン準備
        scene.addEventListener('loaded', () => {
            status.textContent = '準備OK！緑のボタンを押して';
        });

        console.log('超高感度VR準備完了');
    </script>
</body>
</html>
