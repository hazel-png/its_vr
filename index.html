<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  </head>
  <body>
<a-scene webxr="optionalFeatures: local-floor">
  <a-box position="0 1.5 -3" color="#4CC3D9"></a-box>
  
  <a-entity id="camera-rig">
    <a-camera id="my-camera" look-controls></a-camera>
  </a-entity>
  
  <a-sky color="#222"></a-sky>
</a-scene>

<script>
  const camera = document.getElementById('my-camera');
  const rig = document.getElementById('camera-rig');
  let lastX = 0, lastY = 0, lastZ = 0;
  const boost = 5; // ★ここを「10」とかにすると、もっと爆速で動けます

  camera.addEventListener('componentchanged', function (evt) {
    if (evt.detail.name === 'position') {
      const currentPos = camera.getAttribute('position');
      
      // 前回の位置からの差分を計算
      let dx = currentPos.x - lastX;
      let dy = currentPos.y - lastY;
      let dz = currentPos.z - lastZ;

      // リグの位置を「差分 × ブースト」分だけ移動させる
      const rigPos = rig.getAttribute('position');
      rig.setAttribute('position', {
        x: rigPos.x + dx * boost,
        y: rigPos.y + dy * boost,
        z: rigPos.z + dz * boost
      });

      lastX = currentPos.x;
      lastY = currentPos.y;
      lastZ = currentPos.z;
    }
  });
</script>
  </body>
</html>
