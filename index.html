<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-sky color="#050505"></a-sky>
      <a-grid material="color: #00ff00; opacity: 0.3"></a-grid>

      <a-cylinder position="5 1.5 -5" radius="0.5" height="3" color="#FF00FF"></a-cylinder>
      <a-cylinder position="-5 1.5 -10" radius="0.5" height="3" color="#00FFFF"></a-cylinder>
      <a-text id="status" value="Waiting for GPS..." position="0 2 -2" align="center" color="white"></a-text>

      <a-entity id="rig" position="0 0 0">
        <a-camera look-controls></a-camera>
      </a-entity>
    </a-scene>

    <script>
      const rig = document.getElementById('rig');
      const statusText = document.getElementById('status');
      let startCoords = null;

      // 緯度・経度をメートルに変換する簡易計算（日本付近用）
      function latLonToMeter(lat, lon, startLat, startLon) {
        const y = (lat - startLat) * 111319.9; // 緯度1度 = 約111km
        const x = (lon - startLon) * (111319.9 * Math.cos(lat * Math.PI / 180)); // 経度1度
        return { x: x, z: -y }; // VRの奥行きはマイナス方向なので -y
      }

      if ("geolocation" in navigator) {
        navigator.geolocation.watchPosition((position) => {
          const coords = position.coords;
          
          if (!startCoords) {
            // 最初の地点を(0,0,0)にする
            startCoords = coords;
            statusText.setAttribute('value', 'GPS Connected. Start Walking!');
          } else {
            // 移動量を計算
            const pos = latLonToMeter(
              coords.latitude, coords.longitude,
              startCoords.latitude, startCoords.longitude
            );

            // VR内のプレイヤーの位置を更新
            rig.setAttribute('position', `${pos.x} 0 ${pos.z}`);
            
            // ログ表示
            console.log(`Moving to X:${pos.x.toFixed(2)} Z:${pos.z.toFixed(2)}`);
          }
        }, (err) => {
          statusText.setAttribute('value', 'GPS Error: ' + err.message);
        }, {
          enableHighAccuracy: true, // 高精度モード（必須！）
          maximumAge: 0,
          timeout: 5000
        });
      } else {
        statusText.setAttribute('value', 'GPS not supported');
      }
    </script>
  </body>
</html>
