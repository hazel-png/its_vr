<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-sky color="#1a1a1a"></a-sky>
      <a-grid></a-grid>

      <a-entity id="rig" position="0 0 0">
        <a-camera look-controls position="0 1.6 0">
          <a-entity cursor="fuse: true; fuseTimeout: 1500"
                    position="0 0 -1"
                    geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
                    material="color: white; shader: flat"
                    animation__fusing="property: scale; startEvents: fusing; easing: easeInCubic; dur: 1500; from: 1 1 1; to: 0.1 0.1 0.1"
                    animation__mouseleave="property: scale; startEvents: mouseleave; easing: easeInCubic; dur: 500; to: 1 1 1">
          </a-entity>
        </a-camera>
      </a-entity>

      <a-box position="-1.5 1.5 -3" color="#4CC3D9" 
             class="clickable"
             onclick="this.setAttribute('color', 'yellow')"
             animation__click="property: scale; startEvents: click; from: 1.2 1.2 1.2; to: 1 1 1; dur: 300">
      </a-box>

      <a-sphere position="1.5 1.5 -3" radius="0.6" color="#EF2D5E"
                class="clickable"
                onclick="this.setAttribute('position', '1.5 2.5 -3')"
                animation__click="property: scale; startEvents: click; from: 1.2 1.2 1.2; to: 1 1 1; dur: 300">
      </a-sphere>

      <a-text value="Gaze at an object for 1.5s to select" position="-1.5 0.5 -2" color="white" width="4"></a-text>

    </a-scene>
  </body>
</html>
