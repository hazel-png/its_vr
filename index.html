<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Android VR - 頭連動</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #000011, #1a0033);
            font-family: system-ui, -apple-system, sans-serif;
            touch-action: none;
        }
        #android-ui {
            position: fixed;
            top: 15px;
            left: 15px;
            right: 15px;
            background: rgba(0,0,0,0.9);
            color: #4ecdc4;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            z-index: 999;
            backdrop-filter: blur(10px);
            font-size: 16px;
            font-weight: 600;
        }
        #vr-btn {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            color: white;
            border: none;
            padding: 20px 40px;
            border-radius: 25px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.3s;
            touch-action: manipulation;
        }
        #vr-btn:active {
            transform: scale(0.95);
        }
        #status {
            margin: 10px 0;
            font-size: 14px;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="android-ui">
        <div>🤳 Android VRモード</div>
        <div id="status">準備完了！</div>
        <div>Chrome推奨 | ジャイロセンサーON</div>
        <button id="vr-btn">🚀 VR開始（頭で動かす）</button>
    </div>

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

    <a-scene 
        id="vr-scene"
        embedded
        vr-mode-ui="enabled: true"
        device-orientation-permission-ui="enabled: false"
        cursor="rayOrigin: mouse"
        background="color: #000022"
        loading-screen="dotsColor: #4ecdc4; backgroundColor: #000011">
        
        <!-- Android最適化カメラ -->
        <a-camera 
            id="androidCam"
            position="0 1.6 0"
            look-controls="enabled: true; reverseMouseWheel: false; pointerSpeed: 0"
            wasd-controls="enabled: false"
            fov="80">
            
            <!-- Android用クロスヘア -->
            <a-circle geometry="radius: 0.015" 
                      material="color: #4ecdc4; opacity: 0.7; shader: flat"
                      position="0 0 -0.8"
                      scale="1.5 1.5 1"></a-circle>
        </a-camera>

        <!-- Android高性能ライティング -->
        <a-light type="ambient" color="#1a1a3a" intensity="0.4"></a-light>
        <a-light type="directional" color="#ffffff" intensity="0.8" position="2 4 2"></a-light>
        <a-light type="hemisphere" 
                 sky-color="#4ecdc4" 
                 ground-color="#1a0033" 
                 intensity="0.6"></a-light>

        <!-- メインオブジェクト（頭追従インタラクティブ） -->
        <a-box position="-1.5 1.5 -2.5" 
               width="0.8" height="0.8" depth="0.8"
               color="#ff6b6b"
               class="interactive"
               material="shader: flat; emissive: #ff6b6b; emissiveIntensity: 0.2"
               animation="property: rotation; to: 360 360 0; loop: true; dur: 12000">
        </a-box>

        <a-sphere position="1.5 1.8 -3" 
                  radius="0.5"
                  color="#4ecdc4"
                  class="interactive"
                  material="shader: flat; emissive: #4ecdc4; emissiveIntensity: 0.3"
                  animation="property: rotation; to: 0 360 360; loop: true; dur: 10000">
        </a-sphere>

        <!-- Android高速トンネル -->
        <a-cylinder position="0 0 -12" 
                    radius="5" 
                    height="40"
                    material="color: #45b7d1; transparent: true; opacity: 0.3; shader: flat"
                    rotation="90 0 0"
                    animation="property: rotation; to: 360 0 0; loop: true; dur: 25000">
        </a-cylinder>

        <!-- パーティクルシステム -->
        <a-entity particle-system="particleCount: 150; 
                                   velocityValue: 0 0.05 -0.1; 
                                   velocitySpread: 0.5 0.3 0.5;
                                   color: #4ecdc4,#ff6b6b,#45b7d1;
                                   startSize: 0.02; endSize: 0.01"></a-entity>

        <!-- 美しいグラデーション空 -->
        <a-sky color="#000022" 
               animation="property: rotation; to: 0 -45 0; loop: true; dur: 50000">
        </a-sky>

    </a-scene>

    <script>
        // Android専用最適化
        const isAndroid = /Android/i.test(navigator.userAgent);
        const scene = document.getElementById('vr-scene');
        const ui = document.getElementById('android-ui');
        const vrBtn = document.getElementById('vr-btn');
        const status = document.getElementById('status');

        if (isAndroid) {
            document.title = 'Android VR - 頭連動';
            status.textContent = 'Android検出 ✓';
        }

        // Android VR開始
        vrBtn.addEventListener('click', async () => {
            status.textContent = 'VR起動中...';
            
            try {
                // Android Chrome VRモード
                if (scene.canEnterVR()) {
                    await scene.enterVR();
                    ui.classList.add('hidden');
                    status.textContent = '🎉 VR開始！頭を動かして！';
                } else {
                    // 通常のジャイロモード
                    scene.sceneEl.cameraEl.components['look-controls'].enabled = true;
                    ui.classList.add('hidden');
                    status.textContent = '👤 頭追従モード開始';
                }
            } catch (e) {
                status.textContent = '❌ エラー: ' + e.message;
            }
        });

        // 自動VR検出（Android）
        scene.addEventListener('loaded', () => {
            if (isAndroid && scene.isMobile) {
                status.textContent = 'モバイルVR準備完了';
            }
        });

        // 頭の動き検出・フィードバック
        let raycaster;
        scene.addEventListener('enter-vr', () => {
            // Android用Raycaster設定
            raycaster = document.createElement('a-entity');
            raycaster.setAttribute('raycaster', 'objects: .interactive; far: 15; interval: 0');
            raycaster.setAttribute('position', '0 0 0');
            scene.camera.el.appendChild(raycaster);

            // インタラクション
            raycaster.addEventListener('raycaster-intersection', (e) => {
                const hit = e.detail.els[0];
                if (hit) {
                    hit.setAttribute('material', 'emissiveIntensity: 0.8');
                    hit.setAttribute('scale', '1.2 1.2 1.2');
                }
            });

            raycaster.addEventListener('raycaster-intersection-cleared', (e) => {
                const hit = e.detail.els[0];
                if (hit) {
                    hit.setAttribute('material', 'emissiveIntensity: 0.2');
                    hit.setAttribute('scale', '1 1 1');
                }
            });
        });

        // タッチ最適化
        document.addEventListener('touchstart', (e) => {
            e.preventDefault();
        }, { passive: false });

        // パフォーマンス最適化
        scene.setAttribute('renderer', {
            antialias: true,
            colorManagement: true,
            sortObjects: true
        });
    </script>
</body>
</html>
