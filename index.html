<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>スマホVR体験</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            font-family: Arial, sans-serif;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            z-index: 100;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
        }
        #enterVR {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            background: rgba(0,150,255,0.8);
            padding: 20px 40px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            z-index: 100;
            display: block;
        }
        #enterVR:hover {
            background: rgba(0,150,255,1);
        }
    </style>
</head>
<body>
    <div id="info">
        📱 スマホを回転させて操作<br>
        👓 VRゴーグル使用推奨
    </div>
    
    <button id="enterVR">VRモード開始</button>

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>

    <a-scene 
        vr-mode-ui="enabled: true"
        background="color: #000"
        cursor="rayOrigin: mouse"
        device-orientation-permission-ui="enabled: true">
        
        <!-- カメラ（VR用ステレオカメラ） -->
        <a-camera 
            position="0 1.6 0"
            wasd-controls="enabled: false"
            look-controls="enabled: true">
        </a-camera>

        <!-- 照明 -->
        <a-light type="ambient" color="#404040" intensity="0.5"></a-light>
        <a-light type="directional" color="#ffffff" intensity="0.8" position="-1 2 1"></a-light>

        <!-- 回転する立方体 -->
        <a-entity geometry="primitive: box; width: 1; height: 1; depth: 1" 
                  material="color: #ff4d4d; shader: flat; transparent: true; opacity: 0.9"
                  position="0 1.6 -3"
                  animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
        </a-entity>

        <!-- 光る球体 -->
        <a-entity geometry="primitive: sphere; radius: 0.5" 
                  material="color: #00ffff; shader: flat; emissive: #00ffff; emissiveIntensity: 0.5"
                  position="2 1.6 -4"
                  animation="property: rotation; to: 360 0 0; loop: true; dur: 8000; easing: linear">
        </a-entity>

        <!-- トンネル効果 -->
        <a-cylinder position="0 0 -10" 
                    radius="8" 
                    height="30" 
                    material="color: linear-gradient(#ff00ff, #0000ff); shader: flat; transparent: true; opacity: 0.6"
                    rotation="0 0 0"
                    animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear">
        </a-cylinder>

        <!-- 浮遊するパーティクル -->
        <a-entity id="particles">
            <a-sphere position="-1.5 2 -2" radius="0.05" material="color: #ffff00; shader: flat" animation="property: position; to: -1.5 3 -1.5; loop: true; dur: 3000; dir: alternate"></a-sphere>
            <a-sphere position="1.5 1.5 -2.5" radius="0.03" material="color: #ff00ff; shader: flat" animation="property: position; to: 1.5 2.5 -2; loop: true; dur: 4000; dir: alternate"></a-sphere>
            <a-sphere position="0 2.5 -3.5" radius="0.04" material="color: #00ff00; shader: flat" animation="property: position; to: 0 1.5 -3; loop: true; dur: 3500; dir: alternate"></a-sphere>
        </a-entity>

        <!-- 環境（星空など） -->
        <a-sky color="#001122" animation="property: rotation; to: 0 -100 0; loop: true; dur: 60000; easing: linear"></a-sky>

    </a-scene>

    <script>
        // VRボタン制御
        const enterVRBtn = document.getElementById('enterVR');
        const scene = document.querySelector('a-scene');

        enterVRBtn.addEventListener('click', function() {
            scene.enterVR();
            enterVRBtn.style.display = 'none';
        });

        // 自動VRモードチェック
        if (navigator.userAgent.match(/Android|iPhone|iPad|iPod/)) {
            scene.addEventListener('loaded', function() {
                setTimeout(() => {
                    if (scene.isMobile) {
                        scene.enterVR();
                        enterVRBtn.style.display = 'none';
                    }
                }, 1000);
            });
        }

        // デバイスオーエンテーション許可リクエスト
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            document.querySelector('a-scene').addEventListener('DOMContentLoaded', () => {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            console.log('ジャイロセンサー使用許可されました');
                        }
                    });
            });
        }
    </script>
</body>
</html>
