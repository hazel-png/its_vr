<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene environment="preset: starry; groundColor: #000; grid: crossings; gridColor: #00ff00">
      
      <a-entity id="rig" position="0 0 0">
        <a-camera look-controls position="0 1.6 0">
          <a-entity cursor="fuse: true; fuseTimeout: 1200"
                    position="0 0 -1"
                    geometry="primitive: ring; radiusInner: 0.015; radiusOuter: 0.025"
                    material="color: #00ffff; shader: flat; opacity: 0.8"
                    animation__fusing="property: scale; startEvents: fusing; easing: easeInQuad; dur: 1200; from: 1 1 1; to: 0.1 0.1 0.1"
                    animation__mouseleave="property: scale; startEvents: mouseleave; easing: easeInQuad; dur: 300; to: 1 1 1">
          </a-entity>
        </a-camera>
      </a-entity>

      <a-entity id="ui-container" position="0 1.5 -4">
        
        <a-box position="-1.2 0 0" width="1" height="1" depth="0.1"
               material="color: #ff00ff; opacity: 0.7; transparent: true; emissive: #ff00ff; emissiveIntensity: 0.5"
               class="clickable"
               onclick="this.setAttribute('material', 'color', '#ffffff')"
               animation__hover="property: position; to: -1.2 0.1 0.2; startEvents: fusing; dur: 1200"
               animation__leave="property: position; to: -1.2 0 0; startEvents: mouseleave; dur: 300">
        </a-box>

        <a-octahedron position="1.2 0 0" radius="0.6"
                      material="color: #00ffff; opacity: 0.7; transparent: true; emissive: #00ffff; emissiveIntensity: 0.5"
                      class="clickable"
                      animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear"
                      onclick="this.setAttribute('animation', 'dur', '500')"
                      animation__hover="property: scale; to: 1.2 1.2 1.2; startEvents: fusing; dur: 1200"
                      animation__leave="property: scale; to: 1 1 1; startEvents: mouseleave; dur: 300">
        </a-octahedron>

        <a-text value="WELCOME TO METAVERSE" align="center" position="0 1 0" 
                color="#00ffff" width="6" font="mozillavr"></a-text>
      </a-entity>

      <a-torus-knot position="-5 3 -10" radius="1" radius-tubular="0.05"
                    animation="property: rotation; to: 360 360 0; loop: true; dur: 20000; easing: linear"
                    color="#444"></a-torus-knot>
      
      <a-torus-knot position="5 2 -8" radius="0.5" radius-tubular="0.02"
                    animation="property: rotation; to: -360 0 360; loop: true; dur: 15000; easing: linear"
                    color="#666"></a-torus-knot>

    </a-scene>
  </body>
</html>
