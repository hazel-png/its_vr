<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spatial Wallpaper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            perspective: 1000px;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        .layer {
            position: absolute;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .layer-1 {
            width: 300px;
            height: 400px;
            top: 10%;
            transform: translateZ(-100px) rotateX(10deg);
        }

        .layer-2 {
            width: 250px;
            height: 350px;
            top: 15%;
            transform: translateZ(-50px) rotateX(5deg);
            background: linear-gradient(145deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05));
        }

        .layer-3 {
            width: 200px;
            height: 300px;
            top: 20%;
            transform: translateZ(0px);
            background: linear-gradient(145deg, rgba(255,255,255,0.2), rgba(255,255,255,0.1));
        }

        .layer-4 {
            width: 150px;
            height: 250px;
            top: 25%;
            transform: translateZ(50px) rotateX(-5deg);
            background: linear-gradient(145deg, rgba(255,255,255,0.25), rgba(255,255,255,0.15));
        }

        .floating-shapes {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .shape {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            backdrop-filter: blur(10px);
            animation: float 6s ease-in-out infinite;
        }

        .shape:nth-child(1) {
            width: 80px;
            height: 80px;
            top: 20%;
            left: 10%;
            animation-delay: 0s;
        }

        .shape:nth-child(2) {
            width: 60px;
            height: 60px;
            top: 60%;
            right: 15%;
            animation-delay: 2s;
        }

        .shape:nth-child(3) {
            width: 100px;
            height: 100px;
            bottom: 20%;
            left: 20%;
            animation-delay: 4s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        .shine {
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-25deg);
            transition: left 0.5s;
        }

        .status {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255,255,255,0.8);
            font-size: 14px;
            z-index: 100;
        }

        @media (max-width: 480px) {
            .layer-1 { width: 250px; height: 350px; }
            .layer-2 { width: 200px; height: 300px; }
            .layer-3 { width: 160px; height: 250px; }
            .layer-4 { width: 120px; height: 200px; }
        }
    </style>
</head>
<body>
    <div class="status" id="status">デバイスを傾けてみて！</div>
    
    <div class="container" id="container">
        <div class="floating-shapes">
            <div class="shape"></div>
            <div class="shape"></div>
            <div class="shape"></div>
        </div>
        
        <div class="layer layer-1">
            <div class="shine"></div>
        </div>
        <div class="layer layer-2">
            <div class="shine"></div>
        </div>
        <div class="layer layer-3">
            <div class="shine"></div>
        </div>
        <div class="layer layer-4">
            <div class="shine"></div>
        </div>
    </div>

    <script>
        let container = document.getElementById('container');
        let status = document.getElementById('status');
        let layers = document.querySelectorAll('.layer');
        let isDeviceMotionSupported = false;

        // DeviceMotion APIの許可をリクエスト
        if (typeof DeviceMotionEvent.requestPermission === 'function') {
            // iOS 13+ 
            document.addEventListener('click', function() {
                DeviceMotionEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            isDeviceMotionSupported = true;
                            status.textContent = '傾き検知中...';
                            window.addEventListener('devicemotion', handleMotion);
                        }
                    });
            }, { once: true });
        } else {
            // 通常のブラウザ
            window.addEventListener('devicemotion', handleMotion);
            isDeviceMotionSupported = true;
            status.textContent = '傾き検知中...';
        }

        function handleMotion(event) {
            if (!event.accelerationIncludingGravity) return;

            const x = event.accelerationIncludingGravity.x / 10 || 0;
            const y = event.accelerationIncludingGravity.y / 10 || 0;
            const z = event.accelerationIncludingGravity.z / 20 || 0;

            // コンテナ全体の回転
            const rotateX = y * -1;
            const rotateY = x * 1;
            
            container.style.transform = `
                perspective(1000px)
                rotateX(${rotateX}deg)
                rotateY(${rotateY}deg)
                rotateZ(${z}deg)
            `;

            // 各レイヤーの個別調整
            layers.forEach((layer, index) => {
                const depth = (index + 1) * 20;
                layer.style.transform = `
                    translateZ(${depth + z * 5}px)
                    rotateX(${(rotateX * 0.8 + (index * 2))}deg)
                    rotateY(${(rotateY * 0.8 - (index * 1))}deg)
                `;
                
                // 光沢エフェクト
                const shine = layer.querySelector('.shine');
                if (rotateY > 0) {
                    shine.style.left = '0%';
                } else {
                    shine.style.left = '-100%';
                }
            });

            // ステータス更新
            status.textContent = `X:${rotateX.toFixed(1)}° Y:${rotateY.toFixed(1)}° Z:${z.toFixed(1)}`;
        }

        // マウス対応（PC用）
        container.addEventListener('mousemove', (e) => {
            if (!isDeviceMotionSupported) {
                const rect = container.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width * 2 - 1;
                const y = (e.clientY - rect.top) / rect.height * 2 - 1;

                container.style.transform = `
                    perspective(1000px)
                    rotateX(${y * 10}deg)
                    rotateY(${x * 10}deg)
                `;
            }
        });

        // リセット
        container.addEventListener('mouseleave', () => {
            if (!isDeviceMotionSupported) {
                container.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg)';
            }
        });
    </script>
</body>
</html>
