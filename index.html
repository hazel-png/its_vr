<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene webxr="optionalFeatures: local-floor, bounded-floor">
      
      <a-grid></a-grid> 
      
      <a-box position="0 1.5 -3" color="#4CC3D9" animation="property: rotation; to: 0 360 0; loop: true; dur: 10000"></a-box>
      <a-sphere position="1 1.2 -4" radius="0.5" color="#EF2D5E"></a-sphere>
      
      <a-sky color="#222"></a-sky>

      <a-entity camera look-controls wasd-controls position="0 1.6 0"></a-entity>
      
    </a-scene>

    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
    <script>
      // シーンに地面などの環境を追加
      document.querySelector('a-scene').setAttribute('environment', 'preset: forest');
    </script>
  </body>
</html>
