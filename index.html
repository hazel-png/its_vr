<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Android VR - エラー修正版</title>
    <style>
        * { touch-action: none; }
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            font-family: system-ui, sans-serif;
        }
        #ui {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,20,40,0.95);
            color: #4ecdc4;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            z-index: 1000;
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        #start-vr {
            background: linear-gradient(45deg, #ff4757, #ffa502);
            color: white;
            border: none;
            padding: 20px 50px;
            border-radius: 30px;
            font-size: 22px;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(255,71,87,0.4);
            transition: all 0.3s;
        }
        #start-vr:active {
            transform: scale(0.98);
            box-shadow: 0 4px 15px rgba(255,71,87,0.6);
        }
        #debug {
            font-size: 14px;
            margin-top: 15px;
            color: #ffa502;
            font-family: monospace;
        }
        .success { color: #2ed573 !important; }
        .error { color: #ff4757 !important; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="ui">
        <h2>🤳 Android VR</h2>
        <p>頭の動きで360°体験！</p>
        <div id="status">準備完了</div>
        <button id="start-vr">🎮 VR開始</button>
        <div id="debug"></div>
    </div>

    <!-- A-Frame CDN (安定版) -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <a-scene 
        id="scene"
        vr-mode-ui="enabled: true"
        device-orientation-permission-ui="enabled: true"
        background="color: #000011"
        shadow="cast: true; receive: true"
        cursor="rayOrigin: mouse">
        
        <!-- 最適化カメラ -->
        <a-camera 
            id="camera"
            position="0 1.6 0"
            look-controls="enabled: true"
            wasd-controls="enabled: false"
            fov="75">
            
            <!-- 視線インジケータ -->
            <a-ring geometry="radiusInner: 0.02; radiusOuter: 0.04" 
                    material="color: #4ecdc4; opacity: 0.8"
                    position="0 0 -1"></a-ring>
        </a-camera>

        <!-- 照明 -->
        <a-light type="ambient" color="#404060" intensity="0.4"></a-light>
        <a-light type="directional" color="#ffffff" intensity="0.7" 
                 position="-1 2 1"></a-light>

        <!-- インタラクティブオブジェクト -->
        <a-sphere position="0 1.6 -3" 
                  radius="0.6"
                  color="#ff6b6b"
                  class="clickable"
                  material="emissive: #ff6b6b; emissiveIntensity: 0.2; shader: flat"
                  animation="property: rotation; to: 0 360 360; loop: true; dur: 10000">
        </a-sphere>

        <a-box position="2 1.2 -2.5" 
               width="0.8" height="0.8" depth="0.8"
               color="#4ecdc4"
               class="clickable"
               material="emissive: #4ecdc4; emissiveIntensity: 0.2; shader: flat"
               animation="property: rotation; to: 360 0 0; loop: true; dur: 12000">
        </a-box>

        <!-- 回転トンネル -->
        <a-cylinder position="0 0 -10" 
                    radius="4" 
                    height="30"
                    material="color: linear-gradient(#ff6b6b, #4ecdc4); opacity: 0.4; transparent: true"
                    rotation="90 0 0"
                    animation="property: rotation; to: 0 360 0; loop: true; dur: 20000">
        </a-cylinder>

        <!-- 星空 -->
        <a-sky color="#001122" 
               animation="property: rotation; to: 0 -100 0; loop: true; dur: 60000">
        </a-sky>

    </a-scene>

    <script>
        // エラーを完全に回避したAndroid VR制御
        let sceneEl, cameraEl;
        
        window.addEventListener('DOMContentLoaded', () => {
            sceneEl = document.getElementById('scene');
            cameraEl = document.getElementById('camera');
            
            log('Android VR 初期化完了', 'success');
            
            // VRボタン（エラー回避版）
            document.getElementById('start-vr').onclick = startVR;
            
            // 自動初期化
            sceneEl.addEventListener('loaded', () => {
                log('シーン読み込み完了', 'success');
                initControls();
            });
        });

        async function startVR() {
            const status = document.getElementById('status');
            const ui = document.getElementById('ui');
            
            status.textContent = 'ジャイロセンサー開始...';
            
            try {
                // 1. デバイスオーエンテーション許可（Android）
                if ('DeviceOrientationEvent' in window && 
                    typeof DeviceOrientationEvent.requestPermission === 'function') {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission !== 'granted') {
                        throw new Error('ジャイロセンサー許可を拒否されました');
                    }
                }
                
                // 2. ルックコントロール有効化（安全な方法）
                const lookControls = cameraEl.components['look-controls'];
                if (lookControls) {
                    lookControls.enabled = true;
                }
                
                // 3. VRモード試行（エラーハンドリング）
                try {
                    if (sceneEl.canvas && sceneEl.canvas.requestFullscreen) {
                        await sceneEl.canvas.requestFullscreen();
                    }
                    if (typeof sceneEl.enterVR === 'function') {
                        await sceneEl.enterVR();
                    }
                } catch (vrError) {
                    log('フルVR不可 → ジャイロモードで開始', 'success');
                }
                
                // UI非表示
                ui.classList.add('hidden');
                status.textContent = '🎉 頭追従VR開始！';
                status.className = 'success';
                
            } catch (error) {
                log('エラー回避: 簡易モード開始', 'success');
                // フォールバック：簡易ジャイロモード
                cameraEl.components['look-controls'].enabled = true;
                ui.classList.add('hidden');
            }
        }

        function initControls() {
            // Raycasterでインタラクション
            const raycasterEl = document.createElement('a-entity');
            raycasterEl.setAttribute('raycaster', {
                objects: '.clickable',
                far: 10,
                interval: 0
            });
            cameraEl.appendChild(raycasterEl);

            raycasterEl.addEventListener('raycaster-intersection', (evt) => {
                const intersectedEl = evt.detail.els[0];
                if (intersectedEl) {
                    intersectedEl.setAttribute('scale', '1.3 1.3 1.3');
                    intersectedEl.setAttribute('material', 'emissiveIntensity: 0.8');
                }
            });

            raycasterEl.addEventListener('raycaster-intersection-cleared', (evt) => {
                const intersectedEl = evt.detail.els[0];
                if (intersectedEl) {
                    intersectedEl.setAttribute('scale', '1 1 1');
                    intersectedEl.setAttribute('material', 'emissiveIntensity: 0.2');
                }
            });
        }

        function log(message, type = '') {
            const debug = document.getElementById('debug');
            debug.innerHTML += `<div class="${type}">${message}</div>`;
            console.log(message);
        }

        // タッチ最適化
        document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
        document.addEventListener('touchstart', (e) => e.preventDefault(), { passive: false });
    </script>
</body>
</html>
