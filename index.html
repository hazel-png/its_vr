<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Spatial Wallpaper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background: radial-gradient(ellipse at center, #1e3c72 0%, #2a5298 50%, #0f2027 100%);
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        #container {
            position: relative;
            width: 100%;
            height: 100vh;
        }

        #info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255,255,255,0.9);
            font-size: 14px;
            z-index: 100;
            backdrop-filter: blur(10px);
            padding: 10px 15px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        #permission {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            z-index: 200;
        }
    </style>
</head>
<body>
    <div id="info">デバイスを傾けて3Dオブジェクトを動かそう！</div>
    <div id="permission">
        <h3>📱 ジャイロセンサー許可</h3>
        <p>画面をタップして<br>動きを有効にしてください</p>
        <button onclick="requestMotion()" style="
            background: linear-gradient(45deg, #667eea, #764ba2);
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        ">有効にする</button>
    </div>

    <div id="container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        let scene, camera, renderer, objects = [];
        let mouseX = 0, mouseY = 0;
        let gyroX = 0, gyroY = 0, gyroZ = 0;
        let motionEnabled = false;

        init();
        animate();

        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x0f2027, 10, 1000);

            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            // Renderer
            const container = document.getElementById('container');
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            container.appendChild(renderer.domElement);

            // 3Dオブジェクト群を作成
            createCrystal();
            createFloatingOrbs();
            createGeometricShapes();
            createParticleSystem();

            // 環境光とポイントライト
            const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
            scene.add(ambientLight);

            const pointLight1 = new THREE.PointLight(0x667eea, 1, 100);
            pointLight1.position.set(10, 10, 10);
            scene.add(pointLight1);

            const pointLight2 = new THREE.PointLight(0x764ba2, 1, 100);
            pointLight2.position.set(-10, -10, 5);
            scene.add(pointLight2);

            // リサイズ対応
            window.addEventListener('resize', onWindowResize);
            document.addEventListener('mousemove', onMouseMove);

            // ジャイロセンサー
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                // iOS 13+
                document.getElementById('permission').style.display = 'block';
            } else {
                requestMotion();
            }
        }

        function createCrystal() {
            const geometry = new THREE.OctahedronGeometry(1.2, 0);
            const material = new THREE.MeshPhysicalMaterial({
                color: 0x667eea,
                metalness: 0.8,
                roughness: 0.1,
                transmission: 0.9,
                thickness: 0.5,
                clearcoat: 1.0,
                clearcoatRoughness: 0.1
            });
            const crystal = new THREE.Mesh(geometry, material);
            crystal.position.y = 0.5;
            crystal.rotation.x = Math.PI * 0.3;
            scene.add(crystal);
            objects.push(crystal);
        }

        function createFloatingOrbs() {
            const orbGeometry = new THREE.SphereGeometry(0.3, 32, 32);
            for (let i = 0; i < 6; i++) {
                const material = new THREE.MeshPhysicalMaterial({
                    color: new THREE.Color().setHSL(0.6 + i * 0.1, 0.7, 0.6),
                    metalness: 0.5,
                    roughness: 0.2,
                    transmission: 0.8
                });
                const orb = new THREE.Mesh(orbGeometry, material);
                orb.position.set(
                    (Math.random() - 0.5) * 8,
                    (Math.random() - 0.5) * 6,
                    (Math.random() - 0.5) * 8
                );
                scene.add(orb);
                objects.push(orb);
            }
        }

        function createGeometricShapes() {
            const shapes = [
                { type: 'TorusKnotGeometry', args: [0.8, 0.3, 100, 16] },
                { type: 'IcosahedronGeometry', args: [0.7, 1] },
                { type: 'DodecahedronGeometry', args: [0.6] }
            ];

            shapes.forEach((shape, index) => {
                const geometry = new THREE[shape.type](...shape.args);
                const material = new THREE.MeshPhysicalMaterial({
                    color: new THREE.Color().setHSL(0.7 + index * 0.1, 0.8, 0.5),
                    metalness: 0.9,
                    roughness: 0.05,
                    clearcoat: 1.0
                });
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(
                    (index - 1) * 1.5,
                    Math.sin(index) * 0.5,
                    (index - 1) * 0.5
                );
                scene.add(mesh);
                objects.push(mesh);
            });
        }

        function createParticleSystem() {
            const particleCount = 200;
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);

            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 20;
                positions[i * 3 + 1] = (Math.random() - 0.5) * 20;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 20;

                colors[i * 3] = Math.random() * 0.5 + 0.5;
                colors[i * 3 + 1] = Math.random() * 0.3 + 0.2;
                colors[i * 3 + 2] = 1;
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.05,
                vertexColors: true,
                transparent: true,
                opacity: 0.8
            });

            const particles = new THREE.Points(geometry, material);
            scene.add(particles);
            objects.push(particles);
        }

        function requestMotion() {
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission().then(permissionState => {
                    if (permissionState === 'granted') {
                        motionEnabled = true;
                        document.getElementById('permission').style.display = 'none';
                        document.getElementById('info').textContent = 'ジャイロセンサー有効！傾けてみて！';
                        window.addEventListener('devicemotion', onDeviceMotion);
                    }
                }).catch(console.error);
            } else {
                motionEnabled = true;
                document.getElementById('permission').style.display = 'none';
                document.getElementById('info').textContent = 'ジャイロセンサー有効！傾けてみて！';
                window.addEventListener('devicemotion', onDeviceMotion);
            }
        }

        function onDeviceMotion(event) {
            if (event.accelerationIncludingGravity) {
                gyroX = event.accelerationIncludingGravity.x / 10 || 0;
                gyroY = event.accelerationIncludingGravity.y / 10 || 0;
                gyroZ = event.accelerationIncludingGravity.z / 20 || 0;
            }
        }

        function onMouseMove(event) {
            mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            // 傾きに応じたカメラ回転
            const rotateX = motionEnabled ? gyroY * 0.3 : mouseY * 0.3;
            const rotateY = motionEnabled ? gyroX * 0.3 : mouseX * 0.3;

            camera.position.x = Math.sin(rotateY) * 3;
            camera.position.y = Math.sin(rotateX) * 2;
            camera.position.z = Math.cos(rotateY) * 3 + 4;
            camera.lookAt(0, 0, 0);

            // オブジェクト回転アニメーション
            objects.forEach((obj, index) => {
                obj.rotation.x += 0.005 + Math.sin(Date.now() * 0.001 + index) * 0.002;
                obj.rotation.y += 0.008 + Math.cos(Date.now() * 0.0015 + index) * 0.003;
                obj.rotation.z += gyroZ * 0.1;
            });

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
